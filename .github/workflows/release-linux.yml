name: Release (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

jobs:
  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Remove Mono (prevents 'build' assembly error)
        run: sudo apt-get remove -y --allow-remove-essential mono-complete mono-devel msbuild 2>/dev/null || true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo dpkg --remove --force-depends libappindicator3-dev libappindicator3-1 gir1.2-appindicator3-0.1 2>/dev/null || true
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libasound2-dev \
            cmake \
            clang \
            libclang-dev \
            pkg-config

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$(llvm-config --libdir 2>/dev/null || echo /usr/lib/llvm-14/lib)" >> "$GITHUB_ENV"

      - name: Set WHISPER_DONT_GENERATE_BINDINGS
        run: echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Knowte ${{ github.ref_name }}'
          releaseBody: 'See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details.'
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
          tauriScript: 'bun run tauri'
