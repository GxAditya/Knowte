name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: ''
            cmakeToolchainFile: cmake/apple-silicon.cmake

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo dpkg --remove --force-depends libappindicator3-dev libappindicator3-1 gir1.2-appindicator3-0.1 2>/dev/null || true
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libasound2-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Set cmake toolchain (macOS ARM)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "CMAKE_TOOLCHAIN_FILE_aarch64_apple_darwin=${{ github.workspace }}/src-tauri/${{ matrix.cmakeToolchainFile }}" >> "$GITHUB_ENV"

      - name: Install LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Set WHISPER_DONT_GENERATE_BINDINGS (non-Windows)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Knowte ${{ github.ref_name }}'
          releaseBody: 'See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details.'
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
          args: ${{ matrix.args }}
